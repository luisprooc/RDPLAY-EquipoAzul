<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main-menu"></ion-menu-button>
    </ion-buttons>
    <ion-title class="rd-brand">RDPlay</ion-title>
    <ion-buttons slot="end">
      <ion-avatar class="rd-avatar"><div class="rd-flag"></div></ion-avatar>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="rd-page">
  <div class="retos ion-padding">
    <p class="eyebrow"><ion-icon name="star" aria-hidden="true"></ion-icon> RETOS</p>
    <h1>Minijuegos</h1>
    <p class="sub">Elige un reto y suma puntos para el ranking.</p>

    <ion-card class="game-tile" routerLink="/memory">
      <ion-item lines="none">
        <ion-icon name="extension-puzzle-outline" slot="start" color="warning"></ion-icon>
        <ion-label>
          <h2>Pareja Criolla</h2>
          <p>Memoria 4×4 · Encuentra las parejas culturales</p>
        </ion-label>
        <ion-icon name="chevron-forward" slot="end" aria-hidden="true"></ion-icon>
      </ion-item>
    </ion-card>

    <ion-card class="game-tile" routerLink="/sequence">
      <ion-item lines="none">
        <ion-icon name="cafe-outline" slot="start" color="secondary"></ion-icon>
        <ion-label>
          <h2>¡Dale el orden!</h2>
          <p>Secuencia del café dominicano</p>
        </ion-label>
        <ion-icon name="chevron-forward" slot="end" aria-hidden="true"></ion-icon>
      </ion-item>
    </ion-card>

    <ion-card class="game-tile" routerLink="/quiz">
      <ion-item lines="none">
        <ion-icon name="help-circle-outline" slot="start" color="primary"></ion-icon>
        <ion-label>
          <h2>¿Sabes o no sabes?</h2>
          <p>Cultura general con temporizador</p>
        </ion-label>
        <ion-icon name="chevron-forward" slot="end" aria-hidden="true"></ion-icon>
      </ion-item>
    </ion-card>
    
    <ion-button expand="block" routerLink="/ranking" color="warning" class="ion-margin-top">
      <ion-icon name="trophy" slot="start"></ion-icon>
      Ver Ranking Global
    </ion-button>
    
  </div>
</ion-content>
