<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab1" text="Atrás"></ion-back-button>
    </ion-buttons>
    <ion-title class="rd-brand">RDPlay</ion-title>
    <ion-buttons slot="end">
      <ion-avatar class="rd-avatar"><div class="rd-flag"></div></ion-avatar>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="rd-page mem-diff">
  <div class="ion-padding">
    <p class="eyebrow"><ion-icon name="extension-puzzle-outline" aria-hidden="true"></ion-icon> PAREJA CRIOLLA</p>
    <h1>Elige la dificultad</h1>
    <p class="sub">Cada partida baraja iconos típicos dominicanos al azar.</p>

    <ion-card class="diff-card" button="true" (click)="start('easy')">
      <ion-card-header>
        <div class="diff-badge easy">Fácil</div>
        <ion-card-title>6 pares</ion-card-title>
        <ion-card-subtitle>12 cartas · ideal para empezar</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <ion-icon name="leaf-outline" color="success"></ion-icon>
      </ion-card-content>
    </ion-card>

    <ion-card class="diff-card" button="true" (click)="start('medium')">
      <ion-card-header>
        <div class="diff-badge medium">Medio</div>
        <ion-card-title>12 pares</ion-card-title>
        <ion-card-subtitle>24 cartas · memoria en juego</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <ion-icon name="flame-outline" color="warning"></ion-icon>
      </ion-card-content>
    </ion-card>

    <ion-card class="diff-card" button="true" (click)="start('hard')">
      <ion-card-header>
        <div class="diff-badge hard">Difícil</div>
        <ion-card-title>18 pares</ion-card-title>
        <ion-card-subtitle>36 cartas · reto de campeón</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <ion-icon name="skull-outline" color="danger"></ion-icon>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
